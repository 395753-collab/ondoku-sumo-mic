<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>音読大相撲 - マイク判定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #8b0000;
    --green: #1a7a45;
    --blue: #1a5276;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif JP', serif;
    background: #fdfaf0;
    min-height: 100vh;
    padding: 20px 16px 60px;
    color: #1c1c1c;
  }
  .card {
    background: white;
    border: 2px solid var(--red);
    border-radius: 14px;
    padding: 20px;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
  }
  h1 {
    text-align: center;
    font-size: 1.3rem;
    color: var(--red);
    margin-bottom: 6px;
  }
  .sub {
    text-align: center;
    font-size: .8rem;
    color: #888;
    margin-bottom: 16px;
  }
  #textDisplay {
    background: #fdfaf0;
    border: 1px solid #d8d0b8;
    border-radius: 10px;
    padding: 14px;
    font-size: 1.1rem;
    line-height: 2;
    margin-bottom: 14px;
    min-height: 60px;
  }
  #status {
    text-align: center;
    font-size: .95rem;
    color: #555;
    background: #f0f5ff;
    border-left: 5px solid var(--blue);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    min-height: 44px;
    line-height: 1.6;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    margin-bottom: 10px;
    transition: transform .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-go   { background: linear-gradient(135deg,#1d8a50,var(--green)); color: white; }
  .btn-stop { background: linear-gradient(135deg,#e74c3c,#c0392b); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.75;} }
  .btn-gray { background: #f5f0e0; color: #666; border: 1px solid #ccc; font-size: .9rem; }
  .progress-bar { height: 10px; background: #c8dff0; border-radius: 5px; overflow: hidden; margin: 8px 0 4px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,var(--blue),#5dade2); width: 0%; transition: width .3s; }
  .error-box {
    background: #fff3cd; border: 2px solid #ffc107; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 14px; font-size: .85rem; line-height: 1.8; color: #856404;
    display: none;
  }
  .error-box.show { display: block; }
  .rec-dot {
    display: inline-block; width: 10px; height: 10px; background: #e74c3c;
    border-radius: 50%; margin-right: 6px; animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
</style>
</head>
<body>
 
<div class="card">
  <h1>🎤 音読大相撲 - マイク判定</h1>
  <div class="sub">このタブで録音します。終わったら自動で元の画面に結果が送られます。</div>
 
  <div id="textDisplay">テキストを読み込んでいます…</div>
 
  <div id="modelBox" style="display:none;">
    <div class="sub" style="margin-bottom:6px;" id="modelStatusText">AIモデルを準備中…（初回のみダウンロード）</div>
    <div class="progress-bar"><div class="progress-fill" id="modelProgressFill"></div></div>
  </div>
 
  <div id="status">準備中…</div>
 
  <div id="errorBox" class="error-box"></div>
 
  <button id="micBtn" class="btn btn-go" onclick="handleMic()" disabled>🎤 はっけよい！</button>
  <button class="btn btn-gray" onclick="window.close()">このタブを閉じる</button>
</div>
 
<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';
 
env.useBrowserCache = true;
env.allowLocalModels = false;
 
const MODEL_ID   = 'onnx-community/whisper-tiny.en';
const MODEL_TASK = 'automatic-speech-recognition';
 
let whisperPipeline = null;
let modelReady = false;
let mediaStream = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordingStart = null;
 
// ── テキストパラメータの取得（URLクエリ経由）──
// ?title=...&text=...&mode=...&meta=...(JSON, base64)
function getParams() {
  const qs = new URLSearchParams(location.search);
  return {
    title: qs.get('title') || '',
    text:  qs.get('text')  || '',
    mode:  qs.get('mode')  || 'practice',
    meta:  qs.get('meta')  || ''
  };
}
const params = getParams();
 
function renderTargetText(rawText) {
  const el = document.getElementById('textDisplay');
  el.innerHTML = '';
  const regex = /<([^>]+)>|(\S+)/g;
  let m;
  const frag = document.createDocumentFragment();
  while ((m = regex.exec(rawText)) !== null) {
    const span = document.createElement('span');
    if (m[1]) {
      span.textContent = m[1] + ' ';
      span.style.color = '#1a5276';
      span.style.fontStyle = 'italic';
    } else {
      span.textContent = m[2] + ' ';
    }
    frag.appendChild(span);
  }
  el.appendChild(frag);
}
 
if (params.text) {
  renderTargetText(decodeURIComponent(params.text));
} else {
  document.getElementById('textDisplay').textContent = '（テキストが渡されていません）';
}
 
function setStatus(msg) {
  document.getElementById('status').innerHTML = msg;
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.innerHTML = msg;
  box.classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}
 
async function preloadWhisper() {
  document.getElementById('modelBox').style.display = 'block';
  setStatus('AIモデルを読み込んでいます…');
  try {
    whisperPipeline = await pipeline(MODEL_TASK, MODEL_ID, {
      progress_callback: (prog) => {
        if (prog.status === 'downloading' || prog.status === 'loading') {
          const pct = prog.total > 0 ? Math.round((prog.loaded / prog.total) * 100) : 0;
          document.getElementById('modelProgressFill').style.width = pct + '%';
          document.getElementById('modelStatusText').innerText = 'ダウンロード中… ' + pct + '%';
        } else if (prog.status === 'ready') {
          document.getElementById('modelProgressFill').style.width = '100%';
          document.getElementById('modelStatusText').innerText = '✅ 準備完了';
        }
      }
    });
    modelReady = true;
    document.getElementById('modelBox').style.display = 'none';
    document.getElementById('micBtn').disabled = false;
    setStatus('✅ 準備完了！「はっけよい」を押して読んでください。');
  } catch (err) {
    console.error(err);
    setStatus('❌ モデル読み込みに失敗しました。ページをリロードしてください。');
  }
}
preloadWhisper();
 
window.handleMic = async function() {
  if (isRecording) { stopCapture(); return; }
  if (!modelReady) { alert('AIモデルをまだ準備中です。'); return; }
  await startCapture();
};
 
async function startCapture() {
  hideError();
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    console.error('[Mic] getUserMedia error:', err.name, err.message);
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      showError('⚠️ マイクの許可が必要です。ブラウザのアドレスバー付近にマイク許可の確認が出ていないか確認し、許可してください。');
    } else if (err.name === 'NotFoundError') {
      showError('⚠️ マイクが見つかりません。マイクが接続されているか確認してください。');
    } else {
      showError('⚠️ マイクエラー: ' + err.name + ' ' + err.message);
    }
    return;
  }
 
  audioChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
  mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => processAudio();
  mediaRecorder.start(100);
 
  isRecording = true;
  recordingStart = new Date();
 
  const btn = document.getElementById('micBtn');
  btn.innerHTML = '<span class="rec-dot"></span>🛑 止めて判定';
  btn.className = 'btn btn-stop';
  setStatus('🎤 録音中… 読み終わったら「止めて判定」を押してください');
}
 
function stopCapture() {
  isRecording = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  const btn = document.getElementById('micBtn');
  btn.innerText = '⏳ 解析中…';
  btn.className = 'btn btn-gray';
  btn.disabled = true;
  setStatus('🔍 AIが音声を解析中です…');
}
 
async function processAudio() {
  try {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const arrayBuffer = await blob.arrayBuffer();
    const ctx = new AudioContext({ sampleRate: 16000 });
    const decoded = await ctx.decodeAudioData(arrayBuffer);
    await ctx.close();
 
    let float32;
    if (decoded.numberOfChannels >= 2) {
      const ch0 = decoded.getChannelData(0);
      const ch1 = decoded.getChannelData(1);
      float32 = new Float32Array(ch0.length);
      for (let i = 0; i < ch0.length; i++) float32[i] = (ch0[i] + ch1[i]) / 2;
    } else {
      float32 = decoded.getChannelData(0);
    }
 
    const duration = ((new Date() - recordingStart) / 1000) || 1;
    setStatus('🤖 文字起こし中…');
 
    const result = await whisperPipeline(float32, {
      chunk_length_s: 30,
      stride_length_s: 5,
    });
 
    const transcript = (result.text || '').trim();
    setStatus(transcript ? ('認識結果: ' + transcript) : '（音声を認識できませんでした）');
 
    // ★ 結果を親ウィンドウ（GASアプリ）に送信
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'ondoSumoMicResult',
        transcript: transcript,
        duration: duration,
        meta: params.meta
      }, '*');
      setStatus('✅ 結果を送信しました。元のタブに戻って結果を確認してください。');
    } else {
      showError('⚠️ 元のタブが見つかりません。元のタブを閉じずに開いたままにしてください。');
    }
  } catch (err) {
    console.error('[Whisper] error:', err);
    setStatus('⚠️ 解析エラー: ' + err.message);
  } finally {
    const btn = document.getElementById('micBtn');
    btn.innerText = '🎤 もう一度読む';
    btn.className = 'btn btn-go';
    btn.disabled = false;
  }
}
</script>
 
</body>
</html>
